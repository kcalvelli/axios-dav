[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp-dav"
version = "0.1.0"
description = "MCP server for CalDAV/CardDAV calendar and contacts access"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Keith Calvelli"}
]
dependencies = [
    "icalendar",
    "vobject",
    "fastmcp>=2.0.0",
]

[project.scripts]
mcp-dav = "mcp_dav.server:main"

[tool.setuptools]
packages = ["mcp_dav"]
package-dir = {"mcp_dav" = "src/mcp_dav"}
